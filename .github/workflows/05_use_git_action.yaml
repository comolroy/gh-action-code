name: Simple Git Action
on: [push]

jobs:
    use-simple-git-action:
        runs-on: ubuntu-latest
        steps:
            - name: Use Simple Git Action
              id: greet
              uses: actions/hello-world-javascript-action@79ac0da13ee392da3fdd151813d5ce4658cb7e27
              with:
                who-to-greet: 'Kamol Roy'
            - name: Log Greeting Time
              run: echo "Greeting time was ${{ steps.greet.outputs.time }}"